id = "smelt"
version = "2026.06.10.1"
min_engine_version = 2
updated_at = "2026-06-10T00:00:00Z"

[[rules]]
id = "permission_prompt"
state = "blocked"
priority = 900
region = "whole_recent"
visible_blocker = true
contains = ["Allow?"]
any = [
  { contains = ["allow once"] },
  { contains = ["allow edit_file for this session"] },
  { contains = ["allow edit_file in"] },
  { contains = ["deny"] },
]
all = [
  { contains = ["press tab to add a reason"] },
]

[[rules]]
id = "form_question"
state = "blocked"
priority = 850
region = "whole_recent"
visible_blocker = true
line_regex = ['^─ [^─]+ ─+$']
all = [
  { line_regex = ['^\s+\d+\.\s+'] },
  { contains = ["press tab to add a reason"] },
]

[[rules]]
id = "working_indicator"
state = "working"
priority = 800
region = "bottom_non_empty_lines(3)"
visible_working = true
regex = ['✾\s+working[….]{1,3}']

[[rules]]
id = "reasoning_box"
state = "working"
priority = 700
region = "whole_recent"
visible_working = true
line_regex = ['^│ The user']
all = [
  { contains = ["│"] },
]

[[rules]]
id = "home_screen_idle"
state = "idle"
priority = 300
region = "whole_recent"
visible_idle = true
contains = ["f1 help", "/ commands", "@ attach", "! shell"]
all = [
  { contains = ["tip ctrl+enter / ctrl+q, steer the current response without waiting for it to finish"] },
]
